<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menu Makanan</title>
    <style>
         body {
            font-family: Arial, sans-serif;
            background-color: #fff8f0;
            margin: 0;
            padding: 20px;
        }

        h1 {
            text-align: center;
            color: #d35400;
        }

        .menu {
            max-width: 700px;
            margin: auto;
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            border: 1px solid #ddd;
            padding: 12px;
            text-align: left;
        }

        th {
            background-color: #f39c12;
            color: white;
        }

        tr:nth-child(even) {
            background-color: #f9f9f9;
        }
    </style>
</head>
<body>

    <div class="menu">
        <h1>Daftar Menu Makanan</h1>

        <table>
            <tr>
                <th>No</th>
                <th>Nama Makanan</th>
                <th>Harga</th>
            </tr>
            <tr>
                <td>1</td>
                <td>Nasi Goreng</td>
                <td>Rp15.000</td>
            </tr>
            <tr>
                <td>2</td>
                <td>Mie Ayam</td>
                <td>Rp12.000</td>
            </tr>
            <tr>
                <td>3</td>
</html>
